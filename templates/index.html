<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Payments Fraud Detection</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

/* ===== GLOBAL ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #fff7ed, #ffedd5);
    font-family: 'Segoe UI', sans-serif;
    color: #1f2937;
}

/* ===== TITLE ===== */
.title {
    text-align: center;
    font-size: 40px;
    font-weight: bold;
    color: #ea580c;
    margin-bottom: 30px;
}

/* ===== CARD ===== */
.glass {
    background: white;
    border-radius: 20px;
    border: 1px solid #fed7aa;
    box-shadow: 0 10px 30px rgba(255, 115, 0, 0.1);
}

/* ===== INPUT ===== */
.input-box {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #fdba74;
    background: #fff7ed;
}

.input-box:focus {
    border-color: #f97316;
    box-shadow: 0 0 10px rgba(249,115,22,0.3);
    outline: none;
}

/* ===== BUTTON ===== */
.btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(90deg, #f97316, #fb923c);
    border-radius: 12px;
    color: white;
    font-weight: bold;
    border: none;
    cursor: pointer;
}

.btn:hover {
    transform: scale(1.05);
}

/* ===== TABLE ===== */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
}

.status-fraud { color: red; }
.status-safe { color: green; }

/* ===== CIRCLE ===== */
.circle-box {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}

.progress-ring {
    transform: rotate(-90deg);
}

.ring-bg {
    fill: none;
    stroke: #fed7aa;
    stroke-width: 12;
}

.ring-progress {
    fill: none;
    stroke: #f97316;
    stroke-width: 12;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s ease;
}

/* CENTER TEXT */
.circle-text {
    position: absolute;
    font-size: 28px;
    font-weight: bold;
    color: #ea580c;
}

</style>
</head>

<body>

<div class="max-w-7xl mx-auto p-6">

<h1 class="title">Online Payments Fraud Detection</h1>

<div class="grid md:grid-cols-2 gap-8">

<!-- FORM -->
<div class="glass p-6">

<form id="form">

<input name="step" type="number" placeholder="Step" class="input-box mb-3" required>

<select name="type" class="input-box mb-3">
<option>PAYMENT</option>
<option>TRANSFER</option>
<option>CASH_OUT</option>
<option>DEBIT</option>
<option>CASH_IN</option>
</select>

<input name="amount" type="number" placeholder="Amount" class="input-box mb-3" required>

<input name="oldbalanceOrg" type="number" placeholder="Old Sender Balance" class="input-box mb-3">
<input name="newbalanceOrig" type="number" placeholder="New Sender Balance" class="input-box mb-3">

<input name="oldbalanceDest" type="number" placeholder="Old Receiver Balance" class="input-box mb-3">
<input name="newbalanceDest" type="number" placeholder="New Receiver Balance" class="input-box mb-3">

<button type="button" onclick="predict()" class="btn mt-4">
Predict Fraud
</button>

</form>

</div>

<!-- RESULT -->
<div class="glass p-6 text-center">

<h2 id="prediction" class="text-3xl mb-3">Waiting...</h2>
<p id="risk"></p>

<div class="circle-box mt-6">

<svg class="progress-ring" width="160" height="160">
  <circle class="ring-bg" cx="80" cy="80" r="70"/>
  <circle id="progress" class="ring-progress" cx="80" cy="80" r="70"/>
</svg>

<div id="circleText" class="circle-text">0%</div>

</div>

<p id="level" class="mt-4"></p>

</div>

</div>

<!-- HISTORY -->
<div class="glass p-6 mt-10">

<h2 class="mb-4 text-xl">Prediction History</h2>

<table>
<thead>
<tr>
<th>Time</th>
<th>Type</th>
<th>Amount</th>
<th>Risk</th>
<th>Status</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>

</div>

<script>

let history=[];

async function predict(){

let f=new FormData(document.getElementById("form"))

let data={
step:parseFloat(f.get("step")),
type:f.get("type"),
amount:parseFloat(f.get("amount")),
oldbalanceOrg:parseFloat(f.get("oldbalanceOrg")||0),
newbalanceOrig:parseFloat(f.get("newbalanceOrig")||0),
oldbalanceDest:parseFloat(f.get("oldbalanceDest")||0),
newbalanceDest:parseFloat(f.get("newbalanceDest")||0)
}

let res=await fetch("/api/predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

let out=await res.json()
let risk=out.risk || 0

// ===== TEXT =====
document.getElementById("prediction").innerText=out.prediction
document.getElementById("prediction").style.color= out.status==="fraud"?"#ef4444":"#22c55e"
document.getElementById("risk").innerText="Risk: "+risk+"%"

// ===== CIRCLE FIX =====
let circle = document.getElementById("progress")
let text = document.getElementById("circleText")

let radius = 70
let circumference = 2 * Math.PI * radius

// SET dasharray ONCE (IMPORTANT FIX)
circle.style.strokeDasharray = circumference

let offset = circumference - (risk / 100) * circumference
circle.style.strokeDashoffset = offset

// COLOR LOGIC
if (risk > 70) {
    circle.style.stroke = "red"
} else if (risk > 40) {
    circle.style.stroke = "orange"
} else {
    circle.style.stroke = "green"
}

text.innerText = risk + "%"

document.getElementById("level").innerText=out.level

// ===== HISTORY =====
history.unshift({
time:new Date().toLocaleTimeString(),
type:data.type,
amount:data.amount,
risk:risk,
status:out.prediction
})

if(history.length>10)history.pop()

renderHistory()

}

function renderHistory(){

let html=""

history.forEach(h=>{
html+=`
<tr>
<td>${h.time}</td>
<td>${h.type}</td>
<td>${h.amount}</td>
<td>${h.risk}%</td>
<td class="${h.status==="Fraud"?"status-fraud":"status-safe"}">${h.status}</td>
</tr>
`
})

document.getElementById("history").innerHTML=html

}

</script>

</body>
</html>
